name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly at 03:00 UTC — runs the recall@10 SLO fixture (T-012).
    - cron: "0 3 * * *"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test:coverage

      - name: Build
        run: bun run build

  # T-027 — Recall@10 SLO gate (runs nightly + on PRs touching embeddings).
  recall-slo:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'pull_request'
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run recall@10 SLO fixture
        # Runs the SLO harness unit tests (T-012) as a CI gate.
        # In production, this would call the /api/public/cron/recall route
        # with CRON_SECRET; in CI we verify the harness logic directly.
        run: bun run test -- --reporter=verbose src/lib/vector-search/__tests__/recall-slo.test.ts

      - name: Run validation-metrics tests
        # T-010 — embedding quality metrics must pass (regression gate).
        run: bun run test -- --reporter=verbose src/lib/ai/benchmark/__tests__/validation-metrics.test.ts

  # T-027 — Security scan (dependency audit + secret scan).
  security:
    runs-on: ubuntu-latest
    needs: ci
    # Only run on main pushes and PRs to save CI minutes.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies (high severity — blocking)
        # High-severity CVEs must fail the pipeline. Remove the advisory
        # `|| true` that was previously here.
        run: bun audit --severity high

      - name: Scan for secrets in tracked files
        # Simple grep-based secret scan: looks for common API key patterns.
        # False positives are acceptable — this is a guardrail, not a gate.
        run: |
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.py" \
            -E "(sk-[a-zA-Z0-9]{20}|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36})" \
            src/ scripts/ training/ 2>/dev/null; then
            echo "::warning::Potential secrets detected in source files"
            exit 1
          fi
          echo "No secrets detected."
