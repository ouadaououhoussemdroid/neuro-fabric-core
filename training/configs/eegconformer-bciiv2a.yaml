# Single source of truth for the production EEGConformer contract.
# Must stay aligned with:
#   docs/audits/2026-06-17_braindecode-model-selection.md
#   scripts/export_braindecode_eegconformer.py
#   src/lib/ai/models/registry.ts -> registerBraindecodeEEGConformer

name: eegconformer-bciiv2a-v1
architecture: EEGConformer
task: motor-imagery-4class

signal:
  channels: 22
  sample_rate_hz: 250
  window_samples: 1000      # 4 s
  tmin_s: 0.0
  tmax_s: 4.0
  bandpass_hz: [4.0, 38.0]

model:
  n_classes: 4
  embedding_dim: 32         # final_fc pooled features captured by hook
  final_fc_length: auto

dataset:
  loader: moabb
  name: BNCI2014_001        # BCI Competition IV 2a
  subjects: [1, 2, 3, 4, 5, 6, 7, 8, 9]
  holdout_subjects: [9]     # cross-subject hold-out

training:
  seed: 20260617
  epochs: 200
  batch_size: 64
  optimizer: adamw
  lr: 6.25e-4
  weight_decay: 0.0
  scheduler: cosine
  early_stopping_patience: 30
  amp: true

export:
  opset: 17
  out_pt: artefacts/eegconformer-bciiv2a-v1/eegconformer.pt
  out_onnx: artefacts/eegconformer-bciiv2a-v1/eegconformer.onnx
  parity_cosine_min: 0.999